<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatórios — Vida Natural</title>
<link rel="icon" href="/img/faviconvidanatural.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#2E8B6F;--green-d:#1B6B52;--green-2:#1a3d24;--green-3:#234d2e;
  --sidebar-w:220px;--font:'Poppins',sans-serif;
  --bg:#f0f2f5;--card:#fff;--border:#e5e7eb;--text:#1e293b;--muted:#64748b;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--green-2);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto}
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-nav{flex:1;padding:10px 0}
.sb-bottom{padding:14px 18px;border-top:1px solid rgba(255,255,255,.1)}
.sb-logout{display:flex;align-items:center;gap:8px;background:none;border:none;color:rgba(255,255,255,.5);font-family:var(--font);font-size:12.5px;cursor:pointer;padding:6px 0;transition:color .12s;width:100%}
.sb-logout:hover{color:#fff}
.nav-section{padding:10px 18px 4px;font-size:10px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:13px;font-weight:500;color:rgba(255,255,255,.75);cursor:pointer;transition:background .12s;text-decoration:none}
.nav-item:hover,.nav-item.active{background:rgba(255,255,255,.1);color:#fff}
.nav-item.active{border-left:3px solid var(--green)}
.nav-icon{width:16px;height:16px;flex-shrink:0}
.nav-arrow{margin-left:auto;transition:transform .2s;flex-shrink:0}
.nav-group.open .nav-arrow{transform:rotate(90deg)}
.nav-submenu{display:none}
.nav-group.open .nav-submenu{display:block}
.nav-sub-item{padding:7px 18px 7px 44px;font-size:12px}

/* MAIN */
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.page-title{font-size:16px;font-weight:700;color:var(--text)}
.topbar-actions{display:flex;align-items:center;gap:10px}
.content{padding:24px 28px;flex:1}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:8px;font-family:var(--font);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .12s;text-decoration:none}
.btn-primary{background:var(--green-2);color:#fff}
.btn-primary:hover{background:var(--green)}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--green);color:var(--green)}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:22px;flex-wrap:wrap;background:var(--card);padding:14px 18px;border-radius:10px;border:1px solid var(--border)}
.filter-label{font-size:12px;font-weight:700;color:var(--muted);margin-right:4px}
.period-btn{padding:6px 13px;border:1.5px solid var(--border);border-radius:7px;background:#fff;font-family:var(--font);font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .12s}
.period-btn:hover,.period-btn.active{border-color:var(--green);background:#f0fdf4;color:var(--green);font-weight:600}
.date-range{display:flex;align-items:center;gap:6px}
.date-range input{padding:6px 10px;border:1.5px solid var(--border);border-radius:7px;font-family:var(--font);font-size:12px;color:var(--text);outline:none;width:130px}
.date-range input:focus{border-color:var(--green)}
.sep{width:1px;height:20px;background:var(--border);margin:0 4px}

/* SUMMARY CARDS */
.summary-row{display:flex;gap:14px;margin-bottom:20px}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;flex:1}
.sum-label{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.sum-value{font-size:18px;font-weight:800;color:var(--text)}
.sum-sub{font-size:11.5px;color:var(--muted);margin-top:2px}

/* TABLE CARD */
.table-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.table-card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.table-card-title{font-size:14px;font-weight:700;color:var(--text)}

/* DATA TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table thead th{padding:10px 14px;text-align:left;font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap;background:#fafcfe}
.data-table tbody td{padding:11px 14px;border-bottom:1px solid #f8fafc;color:var(--text);vertical-align:middle}
.data-table tbody tr:last-child td{border-bottom:none}
.data-table tbody tr:hover td{background:#f8fafc}
.data-table .td-right{text-align:right}
.data-table .td-center{text-align:center}

.rank-num{display:inline-flex;width:22px;height:22px;border-radius:50%;background:#f1f5f9;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;color:var(--muted)}
.rank-1 .rank-num{background:#fef3c7;color:#d97706}
.rank-2 .rank-num{background:#e2e8f0;color:#475569}
.rank-3 .rank-num{background:#fde8cc;color:#92400e}

.pct-bar-wrap{display:flex;align-items:center;gap:8px}
.pct-bar-bg{width:80px;height:5px;border-radius:3px;background:#f1f5f9;overflow:hidden;flex-shrink:0}
.pct-bar-fg{height:100%;border-radius:3px;background:var(--green)}
.pct-text{font-size:11.5px;color:var(--muted);min-width:34px}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.7);z-index:999;display:none;align-items:center;justify-content:center}
.loading-overlay.active{display:flex}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:50px;color:var(--muted);font-size:13px}

.menu-btn{display:none;align-items:center;justify-content:center;width:38px;height:38px;background:none;border:none;cursor:pointer;color:var(--text);border-radius:8px;flex-shrink:0;margin-right:4px}
.menu-btn:hover{background:var(--bg)}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .25s}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .summary-row{flex-wrap:wrap}
  .menu-btn{display:flex}
  .sb-overlay.open{display:block}
}
</style>
</head>
<body>
<div class="sb-overlay" id="sb-overlay" onclick="toggleSidebar()"></div>

<div class="loading-overlay" id="loading"><div class="spinner"></div></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sb-logo">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:9px;height:9px;background:#2E8B6F;border-radius:50%;flex-shrink:0"></div>
      <span style="font-size:14px;font-weight:700;color:#fff;letter-spacing:.02em">Vida Natural</span>
    </div>
  </div>
  <nav class="sb-nav">
    <div class="nav-section">Menu</div>
    <a class="nav-item" href="/admin/inicio">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Início
    </a>
    <div class="nav-group open" id="nav-analises">
      <a class="nav-item" onclick="toggleSubmenu('analises')" style="cursor:pointer;user-select:none">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Análises
        <svg class="nav-arrow" id="arrow-analises" width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
      </a>
      <div class="nav-submenu" id="sub-analises">
        <a class="nav-item nav-sub-item" href="/admin/analises">Métricas</a>
        <a class="nav-item nav-sub-item active" href="/admin/relatorios">Relatórios</a>
        <a class="nav-item nav-sub-item" href="/admin/ao-vivo">Ao Vivo</a>
        <a class="nav-item nav-sub-item" href="/admin/campanhas">Campanhas</a>
      </div>
    </div>
    <div class="nav-section">Vendas</div>
    <a class="nav-item" href="/admin/pedidos">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Pedidos
    </a>
    <a class="nav-item" href="/admin/carrinhos">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
      Carrinhos Abandonados
    </a>
  </nav>
  <div class="sb-bottom">
    <button class="sb-logout" onclick="logout()">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      Sair
    </button>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <header class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menu"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
    <div class="page-title">Relatórios</div>
    <div class="topbar-actions">
      <button class="btn btn-outline" onclick="exportCsv()">
        <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        Exportar CSV
      </button>
    </div>
  </header>

  <div class="content">

    <!-- FILTER BAR -->
    <div class="filter-bar">
      <span class="filter-label">Período:</span>
      <button class="period-btn" onclick="setPeriod('hoje',this)">Hoje</button>
      <button class="period-btn" onclick="setPeriod('7d',this)">7 dias</button>
      <button class="period-btn active" onclick="setPeriod('30d',this)">30 dias</button>
      <button class="period-btn" onclick="setPeriod('mes',this)">Este mês</button>
      <button class="period-btn" onclick="setPeriod('ano',this)">Este ano</button>
      <button class="period-btn" onclick="setPeriod('custom',this)">Personalizado</button>
      <div class="date-range" id="custom-range" style="display:none">
        <input type="date" id="df">
        <span style="color:var(--muted)">até</span>
        <input type="date" id="dt">
        <button class="btn btn-primary" onclick="applyCustom()" style="padding:6px 12px;font-size:12px">Aplicar</button>
      </div>
    </div>

    <!-- SUMMARY -->
    <div class="summary-row" id="summary-row">
      <div class="sum-card">
        <div class="sum-label">Produtos diferentes</div>
        <div class="sum-value" id="s-produtos">—</div>
        <div class="sum-sub">no período</div>
      </div>
      <div class="sum-card">
        <div class="sum-label">Unidades vendidas</div>
        <div class="sum-value" id="s-unidades">—</div>
        <div class="sum-sub">total de itens</div>
      </div>
      <div class="sum-card">
        <div class="sum-label">Receita dos produtos</div>
        <div class="sum-value" id="s-receita" style="color:var(--green)">—</div>
        <div class="sum-sub">pedidos pagos</div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-card">
      <div class="table-card-head">
        <div class="table-card-title">Vendas por Produto</div>
        <div style="font-size:12px;color:var(--muted)" id="table-period-label"></div>
      </div>
      <div id="table-wrap">
        <div class="empty-state">Carregando...</div>
      </div>
    </div>

  </div>
</main>

<script>
let _data = [];
let _dateFrom = '', _dateTo = '';

function getToken() { return localStorage.getItem('admin_token'); }
function logout() { localStorage.removeItem('admin_token'); location.href = '/admin'; }
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sb-overlay').classList.toggle('open');
  document.body.style.overflow = document.getElementById('sidebar').classList.contains('open') ? 'hidden' : '';
}

function toast(msg, type) {
  let el = document.getElementById('_toast');
  if (!el) {
    el = document.createElement('div');
    el.id = '_toast';
    el.style.cssText = 'position:fixed;bottom:22px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;transition:opacity .3s;color:#fff;pointer-events:none';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.background = type === 'ok' ? '#2E8B6F' : '#ef4444';
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.opacity = '0'; }, 2500);
}

function toggleSubmenu(id) {
  document.getElementById('nav-' + id).classList.toggle('open');
}

function escH(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtBRL(v) {
  return 'R$ ' + ((v || 0) / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ── Period control ────────────────────────────────────────────────────────────
function setPeriod(p, btn) {
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('custom-range').style.display = p === 'custom' ? 'flex' : 'none';

  const now   = new Date(Date.now() - 3 * 3600000);
  const today = now.toISOString().slice(0, 10);

  if (p === 'hoje') {
    _dateFrom = today; _dateTo = today;
  } else if (p === '7d') {
    const d = new Date(now); d.setDate(d.getDate() - 6);
    _dateFrom = d.toISOString().slice(0, 10); _dateTo = today;
  } else if (p === '30d') {
    const d = new Date(now); d.setDate(d.getDate() - 29);
    _dateFrom = d.toISOString().slice(0, 10); _dateTo = today;
  } else if (p === 'mes') {
    _dateFrom = today.slice(0, 7) + '-01'; _dateTo = today;
  } else if (p === 'ano') {
    _dateFrom = today.slice(0, 4) + '-01-01'; _dateTo = today;
  } else if (p === 'custom') {
    return;
  }
  loadReport();
}

function applyCustom() {
  const df = document.getElementById('df').value;
  const dt = document.getElementById('dt').value;
  if (df && dt && df <= dt) { _dateFrom = df; _dateTo = dt; loadReport(); }
  else toast('Período inválido', 'err');
}

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function loadReport() {
  const token = getToken();
  if (!token) { location.href = '/admin'; return; }

  document.getElementById('loading').classList.add('active');
  document.getElementById('table-wrap').innerHTML = '<div class="empty-state">Carregando...</div>';

  const pm = new URLSearchParams();
  if (_dateFrom) pm.set('date_from', _dateFrom);
  if (_dateTo)   pm.set('date_to',   _dateTo);

  try {
    const r = await fetch('/api/admin/analytics?' + pm, {
      headers: { Authorization: 'Bearer ' + token },
    });
    if (r.status === 401) { logout(); return; }
    if (!r.ok) { toast('Erro ao carregar relatório', 'err'); return; }
    const m = await r.json();
    _data = m.top_produtos || [];
    render(m);

    if (_dateFrom && _dateTo) {
      const fmtD = s => s.split('-').reverse().join('/');
      document.getElementById('table-period-label').textContent = fmtD(_dateFrom) + ' até ' + fmtD(_dateTo);
    }
  } catch { toast('Erro de conexão', 'err'); }
  finally { document.getElementById('loading').classList.remove('active'); }
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(m) {
  const prods = m.top_produtos || [];

  // Summary
  const totalUnits  = prods.reduce((s, p) => s + p.count, 0);
  const totalAmount = prods.reduce((s, p) => s + p.amount, 0);
  document.getElementById('s-produtos').textContent  = prods.length;
  document.getElementById('s-unidades').textContent  = totalUnits;
  document.getElementById('s-receita').textContent   = fmtBRL(totalAmount);

  if (prods.length === 0) {
    document.getElementById('table-wrap').innerHTML = '<div class="empty-state">Nenhum produto vendido no período.</div>';
    return;
  }

  const maxPct = Math.max(...prods.map(p => p.pct), 0.01);

  document.getElementById('table-wrap').innerHTML = `
    <table class="data-table">
      <thead>
        <tr>
          <th style="width:36px">#</th>
          <th>Produto</th>
          <th class="td-right">Qtd</th>
          <th class="td-right">Total</th>
          <th>% das Vendas</th>
        </tr>
      </thead>
      <tbody>` +
    prods.map((p, i) =>
      `<tr class="rank-${i+1}">
        <td><span class="rank-num">${i+1}</span></td>
        <td>
          <div style="font-weight:600;color:var(--text)">${escH(p.name)}</div>
          ${p.code ? `<div style="font-size:11px;color:var(--muted)">${escH(p.code)}</div>` : ''}
        </td>
        <td class="td-right" style="font-weight:700">${p.count}</td>
        <td class="td-right" style="font-weight:700;color:var(--green-2)">${fmtBRL(p.amount)}</td>
        <td>
          <div class="pct-bar-wrap">
            <div class="pct-bar-bg"><div class="pct-bar-fg" style="width:${Math.min(100,(p.pct/maxPct*100)).toFixed(1)}%"></div></div>
            <span class="pct-text">${p.pct.toFixed(1)}%</span>
          </div>
        </td>
      </tr>`
    ).join('') +
    '</tbody></table>';
}

// ── Export CSV ────────────────────────────────────────────────────────────────
function exportCsv() {
  if (!_data.length) { toast('Sem dados para exportar', 'err'); return; }
  const esc = v => `"${String(v ?? '').replace(/"/g, '""')}"`;
  const fmt = v => (v / 100).toFixed(2).replace('.', ',');
  const header = 'Posicao;Produto;Codigo;Qtd Vendida;Total (R$);% das Vendas';
  const rows = _data.map((p, i) =>
    [i+1, esc(p.name), esc(p.code || ''), p.count, fmt(p.amount), p.pct.toFixed(2).replace('.',',')].join(';')
  );
  const csv = '﻿' + [header, ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'vendas-por-produto.csv';
  a.click(); URL.revokeObjectURL(url);
}

// ── Init ──────────────────────────────────────────────────────────────────────
(function() {
  const t = getToken();
  if (!t) { location.href = '/admin'; return; }
  try {
    const p = JSON.parse(atob(t.split('.')[1]));
    if (p.exp < Date.now() / 1000) { localStorage.removeItem('admin_token'); location.href = '/admin'; return; }
  } catch { location.href = '/admin'; return; }

  const now   = new Date(Date.now() - 3 * 3600000);
  const today = now.toISOString().slice(0, 10);
  const d30   = new Date(now); d30.setDate(d30.getDate() - 29);
  _dateFrom   = d30.toISOString().slice(0, 10);
  _dateTo     = today;
  loadReport();
})();
</script>
</body>
</html>
