<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Vida Natural</title>
<link rel="icon" href="/img/faviconvidanatural.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;min-height:100vh;display:flex;background:#0f1a12}

.left{
  width:420px;flex-shrink:0;
  background:linear-gradient(160deg,#1a3d24 0%,#0f1a12 100%);
  display:flex;flex-direction:column;justify-content:space-between;
  padding:48px 44px;
}
.left-logo{display:flex;align-items:center;gap:12px}
.left-logo-dot{width:10px;height:10px;background:#2E8B6F;border-radius:50%}
.left-logo-name{font-size:15px;font-weight:700;color:#fff;letter-spacing:.02em}
.left-main{flex:1;display:flex;flex-direction:column;justify-content:center;padding:40px 0}
.left-title{font-size:28px;font-weight:800;color:#fff;line-height:1.2;margin-bottom:14px}
.left-sub{font-size:14px;color:rgba(255,255,255,.5);line-height:1.6}
.left-footer{font-size:12px;color:rgba(255,255,255,.25)}

.right{
  flex:1;background:#fff;
  display:flex;align-items:center;justify-content:center;
  padding:40px 24px;
}
.form-box{width:100%;max-width:360px}
.form-title{font-size:22px;font-weight:800;color:#1a2e22;margin-bottom:6px}
.form-sub{font-size:13px;color:#94a3b8;margin-bottom:32px}

label{display:block;font-size:12px;font-weight:700;color:#475569;margin-bottom:7px;letter-spacing:.03em;text-transform:uppercase}
.input-wrap{position:relative;margin-bottom:22px}
input[type=password],input[type=text]{
  width:100%;padding:13px 44px 13px 16px;
  border:1.5px solid #e2e8f0;border-radius:10px;
  font-family:'Poppins',sans-serif;font-size:14px;color:#1e293b;
  outline:none;transition:border .15s,box-shadow .15s;background:#f8fafc
}
input[type=password]:focus,input[type=text]:focus{
  border-color:#2E8B6F;background:#fff;
  box-shadow:0 0 0 3px rgba(21,167,49,.1)
}
.eye{position:absolute;right:13px;top:50%;transform:translateY(-50%);cursor:pointer;color:#94a3b8;background:none;border:none;padding:2px;display:flex;align-items:center}
.eye:hover{color:#2E8B6F}

.btn{
  width:100%;padding:14px;background:#1a2e22;color:#fff;
  border:none;border-radius:10px;
  font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:background .15s;letter-spacing:.02em
}
.btn:hover:not(:disabled){background:#2E8B6F}
.btn:disabled{background:#94a3b8;cursor:not-allowed}

.alert{padding:12px 14px;border-radius:8px;font-size:13px;margin-bottom:20px;display:none;line-height:1.5}
.alert-err{background:#fef2f2;border:1px solid #fecaca;color:#dc2626}
.alert-ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d}

.spinner{display:none;width:15px;height:15px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:700px){
  .left{display:none}
  .right{background:#f0f2f5}
  .form-box{background:#fff;padding:32px 28px;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
}
</style>
</head>
<body>

<div class="left">
  <div class="left-logo">
    <div class="left-logo-dot"></div>
    <span class="left-logo-name">Vida Natural</span>
  </div>
  <div class="left-main">
    <h2 class="left-title">Painel de<br>Gestão</h2>
    <p class="left-sub">Gerencie seus pedidos, atualize status e acompanhe suas vendas em um só lugar.</p>
  </div>
  <p class="left-footer">Vida Natural &copy; 2025</p>
</div>

<div class="right">
  <div class="form-box">
    <h1 class="form-title">Bem-vindo</h1>
    <p class="form-sub">Entre com sua senha de acesso</p>

    <div id="alert" class="alert"></div>

    <form id="form" autocomplete="off" onsubmit="login(event)">
      <label for="pwd">Senha</label>
      <div class="input-wrap">
        <input type="password" id="pwd" placeholder="••••••••••••" maxlength="128" autocomplete="current-password" required>
        <button type="button" class="eye" onclick="togglePwd()" title="Mostrar senha">
          <svg id="eye-icon" width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
        </button>
      </div>
      <button type="submit" class="btn" id="btn">
        <span class="spinner" id="sp"></span>
        Entrar
      </button>
    </form>
  </div>
</div>

<script>
(function(){
  const t = localStorage.getItem('admin_token');
  if (t) {
    try {
      const p = JSON.parse(atob(t.split('.')[1]));
      if (p.exp > Date.now()/1000) { location.href = '/admin/inicio'; return; }
    } catch(e) {}
    localStorage.removeItem('admin_token');
  }
})();

function showAlert(msg, type='err') {
  const el = document.getElementById('alert');
  el.className = 'alert alert-' + type;
  el.textContent = msg;
  el.style.display = 'block';
}
function hideAlert() { document.getElementById('alert').style.display = 'none'; }

function togglePwd() {
  const inp = document.getElementById('pwd');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

async function login(e) {
  e.preventDefault();
  hideAlert();
  const pwd = document.getElementById('pwd').value;
  const btn = document.getElementById('btn');
  const sp  = document.getElementById('sp');
  btn.disabled = true;
  sp.style.display = 'inline-block';

  try {
    const r = await fetch('/api/admin/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ password: pwd }),
    });
    const d = await r.json();
    if (r.ok && d.token) {
      localStorage.setItem('admin_token', d.token);
      location.href = '/admin/inicio';
    } else {
      showAlert(d.error || 'Erro ao fazer login');
      btn.disabled = false;
      sp.style.display = 'none';
    }
  } catch {
    showAlert('Erro de conexão. Tente novamente.');
    btn.disabled = false;
    sp.style.display = 'none';
  }
}
</script>
</body>
</html>
