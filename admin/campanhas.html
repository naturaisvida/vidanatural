<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campanhas — Vida Natural</title>
<link rel="icon" href="/img/faviconvidanatural.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#2E8B6F;--green-d:#1B6B52;--green-2:#1a3d24;--green-3:#234d2e;
  --sidebar-w:220px;--font:'Poppins',sans-serif;
  --bg:#f0f2f5;--card:#fff;--border:#e5e7eb;--text:#1e293b;--muted:#64748b;
  --orange:#f59e0b;--red:#ef4444;--blue:#3b82f6;
  --bg-dark:#0f172a;--card-dark:#1e293b;--border-dark:#334155;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--green-2);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto}
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-nav{flex:1;padding:10px 0}
.sb-bottom{padding:14px 18px;border-top:1px solid rgba(255,255,255,.1)}
.sb-logout{display:flex;align-items:center;gap:8px;background:none;border:none;color:rgba(255,255,255,.5);font-family:var(--font);font-size:12.5px;cursor:pointer;padding:6px 0;transition:color .12s;width:100%}
.sb-logout:hover{color:#fff}
.nav-section{padding:10px 18px 4px;font-size:10px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:13px;font-weight:500;color:rgba(255,255,255,.75);cursor:pointer;transition:background .12s;text-decoration:none}
.nav-item:hover,.nav-item.active{background:rgba(255,255,255,.1);color:#fff}
.nav-item.active{border-left:3px solid var(--green)}
.nav-icon{width:16px;height:16px;flex-shrink:0}
.nav-arrow{margin-left:auto;transition:transform .2s;flex-shrink:0}
.nav-group.open .nav-arrow{transform:rotate(90deg)}
.nav-submenu{display:none}
.nav-group.open .nav-submenu{display:block}
.nav-sub-item{padding:7px 18px 7px 44px;font-size:12px}

/* MAIN */
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.page-title{font-size:16px;font-weight:700;color:var(--text)}
.content{padding:28px 32px;flex:1}

/* DATE FILTER */
.filter-bar{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:7px 14px;border:1.5px solid var(--border);border-radius:8px;background:#fff;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;font-family:var(--font);transition:all .12s}
.filter-btn.active{background:var(--green);border-color:var(--green);color:#fff}
.custom-dates{display:none;gap:8px;align-items:center}
.custom-dates.open{display:flex}
.custom-dates input{border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;font-family:var(--font);color:var(--text)}
.custom-dates button{padding:7px 14px;background:var(--green);border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)}

/* GOOGLE STATUS BANNER */
.banner{padding:14px 20px;border-radius:12px;margin-bottom:22px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:12px}
.banner-warn{background:#fffbeb;border:1.5px solid #fde68a;color:#92400e}
.banner-info{background:#eff6ff;border:1.5px solid #bfdbfe;color:#1e40af}
.banner-ok{background:#f0fdf4;border:1.5px solid #bbf7d0;color:#166534}
.banner-err{background:#fef2f2;border:1.5px solid #fecaca;color:#991b1b}

/* METRIC CARDS — DARK STYLE */
.dark-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.dark-card{background:var(--card-dark);border:1px solid var(--border-dark);border-radius:12px;padding:18px 20px;color:#fff}
.dc-label{font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.dc-val{font-size:20px;font-weight:800;color:#f8fafc;line-height:1.1}
.dc-val.accent{color:#22c55e}
.dc-val.blue{color:#60a5fa}
.dc-val.orange{color:#fb923c}
.dc-val.red{color:#f87171}
.dc-sub{font-size:12px;color:#64748b;margin-top:4px}

/* ROAS indicator */
.roas-bar{height:6px;border-radius:3px;background:#334155;margin-top:10px;overflow:hidden}
.roas-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#22c55e,#86efac);transition:width .5s ease}

/* DONUT */
.donut-section{background:var(--card-dark);border:1px solid var(--border-dark);border-radius:12px;padding:22px;margin-bottom:20px}
.donut-title{font-size:13px;font-weight:700;color:#f8fafc;margin-bottom:20px}
.donut-wrap{display:flex;align-items:center;gap:32px}
.donut-legend{flex:1}
.legend-item{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1e293b}
.legend-item:last-child{border-bottom:none}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-name{font-size:13px;color:#cbd5e1;flex:1;margin-left:8px}
.legend-pct{font-size:13px;font-weight:700;color:#f8fafc;margin-left:8px}

/* CAMPAIGNS TABLE */
.campaigns-section{background:var(--card-dark);border:1px solid var(--border-dark);border-radius:12px;overflow:hidden;margin-bottom:20px}
.cs-header{padding:18px 20px;border-bottom:1px solid var(--border-dark);display:flex;align-items:center;justify-content:space-between}
.cs-title{font-size:13px;font-weight:700;color:#f8fafc}
table.dark{width:100%;border-collapse:collapse}
table.dark thead th{padding:11px 14px;text-align:left;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border-dark);background:#1e293b}
table.dark tbody tr{border-bottom:1px solid #1e293b;transition:background .1s}
table.dark tbody tr:last-child{border-bottom:none}
table.dark tbody tr:hover{background:rgba(255,255,255,.03)}
table.dark tbody td{padding:12px 14px;font-size:13px;color:#cbd5e1}
.campaign-name{font-weight:600;color:#f8fafc;font-size:13px}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.status-ENABLED{background:#22c55e}
.status-PAUSED{background:#f59e0b}
.status-OTHER{background:#64748b}

/* PRODUCTS FROM CAMPAIGNS */
.products-by-campaign{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.pbc-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.pbc-title{font-size:13px;font-weight:700;color:var(--text)}
.pbc-subtitle{font-size:12px;color:var(--muted)}
.campaign-select{border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;font-family:var(--font);color:var(--text);cursor:pointer}
table.light{width:100%;border-collapse:collapse}
table.light thead th{padding:11px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);background:#fafafa}
table.light tbody tr{border-bottom:1px solid #f3f4f6;transition:background .1s}
table.light tbody tr:last-child{border-bottom:none}
table.light tbody td{padding:12px 14px;font-size:13px;color:var(--text)}
.bar-track{background:#f1f5f9;border-radius:99px;height:6px;width:80px;overflow:hidden;display:inline-block}
.bar-fill{height:100%;border-radius:99px;background:var(--green)}

/* NOT CONFIGURED CARD */
.setup-card{background:var(--card-dark);border:1px solid var(--border-dark);border-radius:12px;padding:48px 32px;text-align:center;color:#94a3b8}
.setup-card h2{color:#f8fafc;font-size:18px;font-weight:700;margin-bottom:12px}
.setup-card p{font-size:13px;line-height:1.7;max-width:460px;margin:0 auto 24px}
.setup-steps{text-align:left;max-width:440px;margin:0 auto 24px;font-size:13px;line-height:2}
.setup-steps li{list-style:none;display:flex;gap:10px;align-items:baseline}
.step-num{background:#334155;color:#f8fafc;font-size:10px;font-weight:800;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:3px}
.code-env{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:14px 18px;text-align:left;font-family:monospace;font-size:11.5px;color:#86efac;line-height:2;max-width:460px;margin:0 auto}

/* LOADING */
.loading-dark{color:#64748b;padding:40px;text-align:center;font-size:13px}
.menu-btn{display:none;align-items:center;justify-content:center;width:38px;height:38px;background:none;border:none;cursor:pointer;color:var(--text);border-radius:8px;flex-shrink:0;margin-right:4px}
.menu-btn:hover{background:var(--bg)}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .25s}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .menu-btn{display:flex}
  .sb-overlay.open{display:block}
}
</style>
</head>
<body>
<div class="sb-overlay" id="sb-overlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sb-logo">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:9px;height:9px;background:#2E8B6F;border-radius:50%;flex-shrink:0"></div>
      <span style="font-size:14px;font-weight:700;color:#fff;letter-spacing:.02em">Vida Natural</span>
    </div>
  </div>
  <nav class="sb-nav">
    <div class="nav-section">Menu</div>
    <a class="nav-item" href="/admin/inicio">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Início
    </a>
    <div class="nav-group open" id="nav-analises">
      <a class="nav-item" onclick="toggleSubmenu('analises')" style="cursor:pointer;user-select:none">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Análises
        <svg class="nav-arrow" id="arrow-analises" width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
      </a>
      <div class="nav-submenu" id="sub-analises">
        <a class="nav-item nav-sub-item" href="/admin/analises">Métricas</a>
        <a class="nav-item nav-sub-item" href="/admin/relatorios">Relatórios</a>
        <a class="nav-item nav-sub-item" href="/admin/ao-vivo">Ao Vivo</a>
        <a class="nav-item nav-sub-item active" href="/admin/campanhas">Campanhas</a>
      </div>
    </div>
    <div class="nav-section">Vendas</div>
    <a class="nav-item" href="/admin/pedidos">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Pedidos
    </a>
    <a class="nav-item" href="/admin/carrinhos">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
      Carrinhos Abandonados
    </a>
  </nav>
  <div class="sb-bottom">
    <button class="sb-logout" onclick="logout()">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      Sair
    </button>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <header class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menu"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
    <div class="page-title">Campanhas Google Ads</div>
    <div style="display:flex;align-items:center;gap:10px">
      <div id="google-status" style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)">
        <div style="width:7px;height:7px;border-radius:50%;background:#d1d5db" id="gads-dot"></div>
        <span id="gads-status-text">Verificando...</span>
      </div>
    </div>
  </header>

  <div class="content">

    <!-- DATE FILTER -->
    <div class="filter-bar">
      <button class="filter-btn" onclick="setFilter('hoje')">Hoje</button>
      <button class="filter-btn" onclick="setFilter('7d')">Últimos 7 dias</button>
      <button class="filter-btn active" id="filter-30d" onclick="setFilter('30d')">Últimos 30 dias</button>
      <button class="filter-btn" onclick="setFilter('mes')">Este mês</button>
      <button class="filter-btn" onclick="toggleCustom()">Personalizado</button>
      <div class="custom-dates" id="custom-dates">
        <input type="date" id="dt-from">
        <span style="color:var(--muted);font-size:13px">até</span>
        <input type="date" id="dt-to">
        <button onclick="applyCustom()">Aplicar</button>
      </div>
    </div>

    <!-- DYNAMIC CONTENT -->
    <div id="main-content">
      <div class="loading-dark" style="background:var(--card-dark);border-radius:12px;margin-bottom:20px">
        Carregando dados do Google Ads...
      </div>
    </div>

  </div>
</main>

<script>
function getToken() { return localStorage.getItem('admin_token'); }
function logout()   { localStorage.removeItem('admin_token'); location.href = '/admin'; }
function toggleSubmenu(id) { document.getElementById('nav-' + id).classList.toggle('open'); }
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sb-overlay').classList.toggle('open');
  document.body.style.overflow = document.getElementById('sidebar').classList.contains('open') ? 'hidden' : '';
}

// ── DATES ────────────────────────────────────────────────────────────────────
let _dateFrom = '', _dateTo = '';

function getRange(key) {
  const now  = new Date(Date.now() - 3 * 3600000);
  const yyyy = d => d.toISOString().slice(0, 10);
  if (key === 'hoje') {
    return { from: yyyy(now), to: yyyy(now) };
  }
  if (key === '7d') {
    const d = new Date(now); d.setDate(d.getDate() - 6);
    return { from: yyyy(d), to: yyyy(now) };
  }
  if (key === '30d') {
    const d = new Date(now); d.setDate(d.getDate() - 29);
    return { from: yyyy(d), to: yyyy(now) };
  }
  if (key === 'mes') {
    const d = new Date(now.getFullYear(), now.getMonth(), 1);
    return { from: yyyy(d), to: yyyy(now) };
  }
  return { from: yyyy(now), to: yyyy(now) };
}

function setFilter(key) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('custom-dates').classList.remove('open');
  const r = getRange(key);
  _dateFrom = r.from; _dateTo = r.to;
  load();
}

function toggleCustom() {
  document.getElementById('custom-dates').classList.toggle('open');
}

function applyCustom() {
  _dateFrom = document.getElementById('dt-from').value;
  _dateTo   = document.getElementById('dt-to').value;
  if (!_dateFrom || !_dateTo) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  load();
}

// ── FORMAT ───────────────────────────────────────────────────────────────────
function fmtBRL(v)  { return 'R$ ' + (v || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function fmtPct(v)  { return ((v || 0) * 100).toFixed(2) + '%'; }
function fmtNum(v)  { return Number(v || 0).toLocaleString('pt-BR'); }
function escH(s)    { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── RENDER CONFIGURED ────────────────────────────────────────────────────────
function render(adsData, ordersData) {
  const ads  = adsData;
  const t    = ads.totals || {};
  const ords = ordersData?.orders || [];

  // Calc from orders
  const paidOrders   = ords.filter(o => ['paid','partial_void','canceled_after_payment'].includes(o.status));
  const revenue      = paidOrders.reduce((a, o) => a + (o.amount || 0), 0) / 100;
  const pendingRev   = ords.filter(o => o.status === 'aguardando_pagamento').reduce((a, o) => a + (o.amount || 0), 0) / 100;
  const refundedRev  = ords.filter(o => o.status === 'canceled_after_payment').reduce((a, o) => a + (o.amount || 0), 0) / 100;

  const spend = t.cost || 0;
  const roas  = spend > 0 ? revenue / spend : 0;
  const lucro = revenue - spend;
  const margem = revenue > 0 ? (lucro / revenue) * 100 : 0;

  // Payment method donut
  const byMethod = { PIX: 0, Cartão: 0, Boleto: 0 };
  ords.forEach(o => {
    const m = o.method || '';
    if (m === 'pix') byMethod.PIX += (o.amount || 0) / 100;
    else if (m === 'cartao') byMethod['Cartão'] += (o.amount || 0) / 100;
    else if (m === 'boleto') byMethod.Boleto += (o.amount || 0) / 100;
  });
  const totalMethod = Object.values(byMethod).reduce((a, b) => a + b, 0) || 1;

  // Build donut SVG
  const COLORS = { PIX: '#3b82f6', Cartão: '#38bdf8', Boleto: '#f59e0b' };
  const RADIUS = 52; const CX = 64; const CY = 64; const STROKE = 22;
  const circumference = 2 * Math.PI * RADIUS;
  let donutOffset = 0;
  const slices = Object.entries(byMethod).map(([name, val]) => {
    const pct   = val / totalMethod;
    const dash  = pct * circumference;
    const gap   = circumference - dash;
    const offset = donutOffset;
    donutOffset += dash;
    return { name, val, pct, dash, gap, offset, color: COLORS[name] };
  });
  const svgSlices = slices.map(s =>
    `<circle cx="${CX}" cy="${CY}" r="${RADIUS}" fill="none" stroke="${s.color}" stroke-width="${STROKE}"
      stroke-dasharray="${s.dash} ${s.gap}" stroke-dashoffset="${-s.offset + circumference / 4}"
      transform="rotate(-90 ${CX} ${CY})" />`
  ).join('');

  const legendHtml = slices.map(s =>
    `<div class="legend-item">
      <span class="legend-dot" style="background:${s.color}"></span>
      <span class="legend-name">${escH(s.name)}</span>
      <span class="legend-pct">${(s.pct * 100).toFixed(0)}%</span>
    </div>`
  ).join('');

  // Campaigns table
  const campaigns = (ads.campaigns || []);
  const campaignRows = campaigns.length ? campaigns.map(c => {
    const roasCamp = c.cost > 0 ? (c.convValue / c.cost) : 0;
    const status = c.status === 'ENABLED' ? 'ENABLED' : c.status === 'PAUSED' ? 'PAUSED' : 'OTHER';
    const statusLabel = { ENABLED: 'Ativa', PAUSED: 'Pausada', OTHER: c.status || '—' };
    return `<tr>
      <td>
        <div class="campaign-name">${escH(c.name)}</div>
      </td>
      <td><span class="status-dot status-${status}"></span>${statusLabel[status]}</td>
      <td style="font-weight:700;color:#f87171">${fmtBRL(c.cost)}</td>
      <td>${fmtNum(c.clicks)}</td>
      <td style="color:#94a3b8">${fmtPct(c.ctr)}</td>
      <td style="font-weight:600;color:#fbbf24">${fmtBRL(c.avgCpc)}</td>
      <td>${fmtNum(c.conversions)}</td>
      <td style="font-weight:700;color:${roasCamp >= 3 ? '#22c55e' : roasCamp >= 1.5 ? '#fbbf24' : '#f87171'}">${roasCamp.toFixed(2)}x</td>
    </tr>`;
  }).join('') : `<tr><td colspan="8" class="loading-dark">Nenhuma campanha no período.</td></tr>`;

  // Products by campaign from UTM
  const bycamp = {};
  ords.forEach(o => {
    const camp = o.utm_campaign || o.metadata?.utm_campaign || '(direto)';
    if (!bycamp[camp]) bycamp[camp] = { orders: 0, revenue: 0, products: {} };
    bycamp[camp].orders++;
    bycamp[camp].revenue += (o.amount || 0) / 100;
    const prod = o.items?.[0]?.description || o.product || 'Produto';
    bycamp[camp].products[prod] = (bycamp[camp].products[prod] || 0) + 1;
  });
  const campList = Object.entries(bycamp).sort((a, b) => b[1].revenue - a[1].revenue);
  const campOptions = campList.map(([name]) => `<option value="${escH(name)}">${escH(name)}</option>`).join('');

    const pct = (data.revenue / topRevAll);

// ── LOAD ─────────────────────────────────────────────────────────────────────
async function load() {
  const token = getToken();
  if (!token) { location.href = '/admin'; return; }

  const df = _dateFrom, dt = _dateTo;

  const [adsRes, ordersRes] = await Promise.allSettled([
    fetch(`/api/admin/google-ads?date_from=${df}&date_to=${dt}`, { headers: { Authorization: 'Bearer ' + token } }),
    fetch(`/api/admin/orders?date_from=${df}&date_to=${dt}`,     { headers: { Authorization: 'Bearer ' + token } }),
  ]);

  const adsOk     = adsRes.status === 'fulfilled' && adsRes.value.ok;
  const ordersOk  = ordersRes.status === 'fulfilled' && ordersRes.value.ok;

  const adsData    = adsOk    ? await adsRes.value.json()    : null;
  const ordersData = ordersOk ? await ordersRes.value.json() : { orders: [] };

  if (!adsData || adsData.configured === false) {
    renderNotConfigured();
    return;
  }

  document.getElementById('gads-dot').style.background = '#22c55e';
  document.getElementById('gads-status-text').textContent = 'Conectado';

  render(adsData, ordersData);
}

// ── INIT ─────────────────────────────────────────────────────────────────────
(function() {
  const t = getToken();
  if (!t) { location.href = '/admin'; return; }
  try {
    const p = JSON.parse(atob(t.split('.')[1]));
    if (p.exp < Date.now() / 1000) { localStorage.removeItem('admin_token'); location.href = '/admin'; return; }
  } catch { location.href = '/admin'; return; }

  const r = getRange('30d');
  _dateFrom = r.from; _dateTo = r.to;
  load();
})();
</script>
